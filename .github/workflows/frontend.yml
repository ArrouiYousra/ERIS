name: Frontend CI

on:
  push:
    #paths:
    #- 'frontend/**'
  pull_request:
    #paths:
    #- 'frontend/**'

jobs:
  # ─── Job 1: Lint (ESLint) ───
  lint:
    name: ESLint
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run ESLint
        working-directory: frontend
        run: npm run lint

  # ─── Job 2: Test ───
  test:
    name: Tests
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run tests
        working-directory: frontend
        run: npm test

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-reports
          path: frontend/coverage/
          retention-days: 1

  # ─── Job 3: Build ───
  build:
    name: Build
    needs: [test]
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build production
        working-directory: frontend
        run: npm run build

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/
          retention-days: 1

  # ─── Job 4: Security Scan ───
  security:
    name: Security Audit
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run npm audit
        working-directory: frontend
        run: npm audit --audit-level=critical
        continue-on-error: true

      - name: Check for known vulnerabilities
        working-directory: frontend
        run: |
          echo "Security audit results:"
          npm audit --json > audit-report.json 2>/dev/null || true
          CRITICAL=$(cat audit-report.json | node -e "const d=require('fs').readFileSync('/dev/stdin','utf8');try{const j=JSON.parse(d);console.log(j.metadata?.vulnerabilities?.critical||0)}catch{console.log(0)}")
          HIGH=$(cat audit-report.json | node -e "const d=require('fs').readFileSync('/dev/stdin','utf8');try{const j=JSON.parse(d);console.log(j.metadata?.vulnerabilities?.high||0)}catch{console.log(0)}")
          echo "Critical: $CRITICAL | High: $HIGH"
          if [ "$CRITICAL" -gt 0 ]; then
            echo "Critical vulnerabilities found!"
            exit 1
          fi
          echo "No critical vulnerabilities"

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: frontend/audit-report.json
          retention-days: 1
