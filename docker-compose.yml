services:
  postgres:
    image: postgres:16-alpine
    container_name: eris-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fourth_argument}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - eris-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-fourth_argument}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports :
      - "${EXTERNAL_DB_PORT}:5432"


  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eris-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: ${DB_URL}
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      PORT: 8081
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:*,http://127.0.0.1:*}
    ports:
      - "8081:8081"
    networks:
      - eris-network
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8081}
        VITE_WS_URL: ${VITE_WS_URL:-http://localhost:8081/ws}
        VITE_WS_BASE_URL: ${VITE_WS_BASE_URL:-ws://localhost:8081}
    container_name: eris-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"
    networks:
      - eris-network

volumes:
  postgres_data:

networks:
  eris-network:
    driver: bridge